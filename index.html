<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bayon Bas-Relief Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Two full-screen viewport containers */
        #map-container, #viewer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #viewer, #openseadragon-viewer {
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        /* Floating Back to Map Button */
        #back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 12px 20px;
            background: #2c3e50;
            color: white;
            border: 2px solid #34495e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background 0.2s, transform 0.1s;
        }

        #back-button:hover {
            background: #34495e;
            transform: translateY(-1px);
        }

        #back-button:active {
            transform: translateY(1px);
        }

        /* Interactive marker pins on the Site Plan */
        .annotation-marker {
            background: rgba(31, 117, 53, 0.8); /* dark green */
            border: 2px solid white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            color: white;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            line-height: 28px;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            /* Keep bottom-center of the marker pinned to the coordinate */
            transform-origin: center bottom; 
        }
        
        .annotation-marker .popup-info {
            display: none;
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #444;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            width: 260px;
            white-space: normal;
            z-index: 100;
        }

        .annotation-marker.open .popup-info {
            display: block;
        }
    </style>
</head>
<body>

    <!-- CONTAINER 1: The Interactive Site Plan -->
    <div id="map-container">
        <div id="viewer"></div>
    </div>

    <!-- CONTAINER 2: The Deep Zoom Scan Viewer (Hidden by default) -->
    <div id="viewer-container" style="display: none;">
        <button id="back-button" onclick="closeRelief()">&larr; Back to Site Plan</button>
        <div id="openseadragon-viewer"></div>
    </div>

    <script>
        // 1. Initialize the main Site Plan viewer
        const viewer = OpenSeadragon({
            id: "viewer",
            prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
            clickToZoom: false, // Prevents canvas jumping when clicking markers
            tileSources: {
                type: 'image',
                url: 'bayonplan.jpg' // Your base site plan image
            }
        });

        // Global variable to keep track of our active scan viewer instance
        let scanViewer = null;
        let activeDziPath = ""; // <-- Track the active DZI string path globally

        // --- 2. ANNOTATION DATABASE (FOR HIGH-RES SCANS) ---
        const scanAnnotations = [
            {
                parentScan: "ES_tiled.dzi",
                id: "I-1",
                x: 0.3454,
                y: 0.0430,
                category: "intervention", 
                title: "New Stones Added",
                desc: "Sandstone added, engravings not transferred or replicated."
            },
            {
                parentScan: "ES_tiled.dzi",
                id: "D-1",
                x: 0.7493,
                y: 0.0581,
                category: "damage", 
                title: "Surface Deposit",
                desc: "Caked on white surface deposits."
            },
            {
                parentScan: "ES_tiled.dzi",
                id: "R-1",
                x: 0.6469,
                y: 0.1178,
                category: "relief", 
                title: "Figure on Horseback",
                desc: "A being rides along foot soldiers on horseback."
            }
        ];

        // --- 3. POPULATE MAIN SITE PLAN MARKERS ---
        viewer.addHandler('open', function() {
            // Your gallery locations on the site plan
            const galleryTags = [
                {
                    id: "EN",
                    x: 0.62701, 
                    y: 0.2096,
                    info: "<strong>East Gallery (North Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"EN_tiled.dzi\", \"East Gallery - North Section\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "ES",
                    x: 0.6270, 
                    y: 0.4724,
                    info: "<strong>East Gallery (South Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"ES_tiled.dzi\", \"North Gallery - East Section (Eastern Side)\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "NE",
                    x: 0.5178, 
                    y: 0.0970,
                    info: "<strong>North Gallery (East Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"NE_tiled.dzi\", \"North Gallery - East Section (Western Side)\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "NW",
                    x: 0.2085, 
                    y: 0.0970,
                    info: "<strong>North Gallery (West Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"NW_tiled.dzi\", \"North Gallery - West Section\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "SE",
                    x: 0.5178, 
                    y: 0.5750,
                    info: "<strong>South Gallery (East Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"SE_tiled.dzi\", \"South Gallery - East Section\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "SW",
                    x: 0.2085, 
                    y: 0.5810,
                    info: "<strong>South Gallery (West Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"SW_tiled.dzi\", \"South Gallery - West Section\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "WN",
                    x: 0.0980, 
                    y: 0.2096,
                    info: "<strong>West Gallery (North Section)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"WN_tiled.dzi\", \"West Gallery - North Section\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "WS",
                    x: 0.0980, 
                    y: 0.4724,
                    info: "<strong>West Gallery (South Section 1)</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"WS_tiled.dzi\", \"West Gallery - South Section\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "A",
                    x: 0.6091, 
                    y: 0.1115,
                    info: "<strong>North East Corner Gallery</strong><br>Bas-relief depicting narrative carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"NEcorner_EtoN_tiled.dzi\", \"North East Corner Gallery\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                },
                {
                    id: "B",
                    x: 0.6091,
                    y: 0.5557,
                    info: "<strong>South East Corner Gallery</strong><br>Octagonal brick temple carvings.<br><br><a href='javascript:void(0);' onclick='loadRelief(\"EScorner_StoE_tiled.dzi\", \"South East Corner Gallery\")' style='color: #3498db; text-decoration: underline; font-weight: bold;'>Open High-Res Scan &rarr;</a>"
                }
            ];

            galleryTags.forEach(function(tag) {
                const marker = document.createElement('div');
                marker.className = 'annotation-marker';
                marker.innerText = tag.id;

                const popup = document.createElement('div');
                popup.className = 'popup-info';
                popup.innerHTML = tag.info;
                marker.appendChild(popup);

                // Stop OSD click-drag behaviors from leaking into popup elements
                const stopBubbling = e => e.stopPropagation();
                ['click', 'mousedown', 'mouseup', 'pointerdown', 'pointerup'].forEach(evt => {
                    popup.addEventListener(evt, stopBubbling);
                });

                viewer.addOverlay({
                    element: marker,
                    location: new OpenSeadragon.Point(tag.x, tag.y)
                });

                new OpenSeadragon.MouseTracker({
                    element: marker,
                    clickHandler: function() {
                        document.querySelectorAll('.annotation-marker').forEach(m => {
                            if (m !== marker) m.classList.remove('open');
                        });
                        marker.classList.toggle('open');
                    }
                });
            });
        });

        // --- 4. HIGH-RES SCAN VIEWER INITIALIZATION & LOADING ---
        function initScanViewer() {
            scanViewer = OpenSeadragon({
                id: "openseadragon-viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                showNavigator: true,
                navigatorPosition: "BOTTOM_RIGHT",
                clickToZoom: false // Keep off so pin interactions don't auto-zoom the canvas
            });

            // Coordinate Helper (Runs once and stays registered)
            scanViewer.addHandler('canvas-click', function(event) {
                if (event.quick) {
                    const viewportPoint = scanViewer.viewport.pointFromPixel(event.position);
                    console.log(`Scan Coords (${scanViewer.tileSources}) -> X: ${viewportPoint.x.toFixed(4)}, Y: ${viewportPoint.y.toFixed(4)}`);
                }
            });

            // Handle injecting markers whenever a new scan finishes opening
            scanViewer.addHandler('open', function() {
                // IMPORTANT: Wipe out previous scan elements so we don't pile up ghosts
                scanViewer.clearOverlays();

                const activeAnnotations = scanAnnotations.filter(ann => ann.parentScan === activeDziPath);
                
                activeAnnotations.forEach(function(ann) {
                    const pin = document.createElement('div');
                    pin.className = 'annotation-marker'; 
                    pin.innerText = ann.id;

                    // Color profile styling map
                    let markerColor = "rgba(230, 126, 34, 0.9)"; // Default Orange
                    switch(ann.category) {
                        case "damage":
                            markerColor = "rgba(231, 76, 60, 0.95)";  // Red
                            break;
                        case "inscription":
                            markerColor = "rgba(46, 204, 113, 0.95)"; // Green
                            break;
                        case "relief":
                            markerColor = "rgba(155, 89, 182, 0.95)"; // Purple
                            break;
                        case "intervention":
                            markerColor = "rgba(47, 129, 222, 0.83)"; // Blue
                            break;
                    }
                    pin.style.background = markerColor;

                    const popup = document.createElement('div');
                    popup.className = 'popup-info';
                    popup.innerHTML = `<strong>${ann.title}</strong><br>${ann.desc}`;
                    pin.appendChild(popup);

                    const stopBubbling = e => e.stopPropagation();
                    ['click', 'mousedown', 'mouseup', 'pointerdown', 'pointerup'].forEach(evt => {
                        popup.addEventListener(evt, stopBubbling);
                    });

                    scanViewer.addOverlay({
                        element: pin,
                        location: new OpenSeadragon.Point(ann.x, ann.y)
                    });

                    new OpenSeadragon.MouseTracker({
                        element: pin,
                        clickHandler: function() {
                            document.querySelectorAll('#openseadragon-viewer .annotation-marker').forEach(m => {
                                if (m !== pin) m.classList.remove('open');
                            });
                            pin.classList.toggle('open');
                        }
                    });
                });
            });
        }
        
        // Dynamic Loading Function
        // Hides the map, opens the clean viewer, and builds your high-res bas-relief
        function loadRelief(dziPath, title) {
            // Close any open popups on the site plan before moving
            document.querySelectorAll('#viewer .annotation-marker').forEach(m => m.classList.remove('open'));

            // Show scan container, hide main map
            document.getElementById("map-container").style.display = "none";
            document.getElementById("viewer-container").style.display = "block";

            activeDziPath = dziPath;
            
            // Lazy-initialize scanViewer on first use
            if (!scanViewer) {
                initScanViewer();
            }

            scanViewer.open(dziPath);
            console.log("Loading scan: " + title);
        }

        function closeRelief() {
            document.getElementById("viewer-container").style.display = "none";
            document.getElementById("map-container").style.display = "block";
            
            // Simply close the image stream rather than destroying the canvas instance.
            // This preserves click listeners and avoids recreating WebGL/2D contexts.
            if (scanViewer) {
                scanViewer.close();
            }

            activeDziPath = "";
        }

        // Click helper for plotting coordinates
        viewer.addHandler('canvas-click', function(event) {
            if (event.quick) {
                const viewportPoint = viewer.viewport.pointFromPixel(event.position);
                console.log(`Site Plan Coords -> X: ${viewportPoint.x.toFixed(4)}, Y: ${viewportPoint.y.toFixed(4)}`);
            }
        });
    </script>
</body>
</html>
